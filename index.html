<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Can You Guess All My Favorite Things??</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite romance movie?
        <select id="movie-answer">
          <option value="movie1">A Silent Voice</option>
          <option value="movie2">10 Things I Hate About You</option>
          <option value="movie3">How to Lose a Guy in 10 Days</option>
          <option value="movie4">The Notebook</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      <img class="moviePics" width="400">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 My Favorite Artist?
        <select id="book-answer">
          <option value="artist1">Frank Ocean</option>
          <option value="artist2">Tyler The Creator</option>
          <option value="artist3">SZA aka Solana</option>
          <option value="artist4">Radiohead</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie3") {
          $("#movie-text").text("YESSSS, YESSSS, and YESSS AGAIN!");
          $(".moviePics").attr("src", "https://occ-0-8407-90.1.nflxso.net/dnm/api/v6/6AYY37jfdO6hpXcMjf9Yu5cnmO0/AAAABVDmXOWqrmtIL5J6RqKSr33VRPiD4kcT3TFK17g31oqYi0pJnRocoaab8U7gdEZ5mZcR92i_TicpzOi_pCed9TdsyQ0XALpbrT-7PzJtxw.jpg?r=0ec")
        } 
        else {
          $("#movie-text").text("I LOVEEE but no");
          $(".moviePics").attr("src", "https://freesvg.org/img/Sad-Face.png")
        }
      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("YESSSS!");
        } 
        else {
          $("#book-text").text("Try Again!");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
